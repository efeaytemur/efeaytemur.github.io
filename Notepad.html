
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Defteri</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef4fb;
    --surface: #f8fbff;
    --surface2: #e2edf8;
    --border: #c5d9ef;
    --accent: #2d82c9;
    --accent2: #5fa8e0;
    --text: #1a2d42;
    --text-muted: #7a9ab8;
    --text-dim: #4a6f8f;
    --danger: #d94f4f;
    --tag-bg: #d6eaf8;
    --shadow: 0 8px 40px rgba(45,130,201,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo span {
    font-style: italic;
    opacity: 0.5;
    font-size: 16px;
  }

  .note-count {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .search-wrap {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px 9px 36px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }

  .search-container { position: relative; }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .notes-list::-webkit-scrollbar { width: 4px; }
  .notes-list::-webkit-scrollbar-track { background: transparent; }
  .notes-list::-webkit-scrollbar-thumb { background: #b0cce6; border-radius: 2px; }

  .note-item {
    padding: 14px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .note-item:hover { background: var(--surface2); }
  .note-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  .note-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .note-item.active .note-item-title { color: var(--accent); }

  .note-item-preview {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .note-item-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .note-item-date {
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .note-tag {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--tag-bg);
    color: var(--accent);
    letter-spacing: 0.5px;
    border: 1px solid #a8cce8;
  }

  .new-note-btn {
    margin: 12px 16px;
    padding: 10px;
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .new-note-btn:hover { opacity: 0.85; }
  .new-note-btn:active { transform: scale(0.98); }

  .empty-list {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.8;
  }

  /* Main editor */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  #note-title-input {
    background: transparent;
    border: none;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--text);
    outline: none;
    flex: 1;
    min-width: 0;
  }

  #note-title-input::placeholder { color: var(--text-muted); font-style: italic; }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tb-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .tb-btn:hover { border-color: var(--accent); color: var(--accent); }

  .tb-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .tb-btn.save {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
    font-weight: 500;
  }

  .tb-btn.save:hover { opacity: 0.85; color: #ffffff; }

  .tag-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-muted);
  }

  #tag-input {
    background: transparent;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    outline: none;
    width: 90px;
  }

  #tag-input::placeholder { color: var(--text-muted); }

  #note-body {
    flex: 1;
    padding: 36px 56px;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 2;
    resize: none;
    outline: none;
    overflow-y: auto;
  }

  #note-body::placeholder { color: var(--text-muted); font-style: italic; }
  #note-body::-webkit-scrollbar { width: 4px; }
  #note-body::-webkit-scrollbar-track { background: transparent; }
  #note-body::-webkit-scrollbar-thumb { background: #b0cce6; border-radius: 2px; }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 56px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  .dot.saved { background: #4caf7d; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
  }

  .welcome-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .welcome p {
    font-size: 11px;
    text-align: center;
    line-height: 1.8;
    max-width: 280px;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 12px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    border-left: 3px solid var(--accent);
    box-shadow: var(--shadow);
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-left-color: var(--danger); }

  /* Confirm dialog */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    max-width: 360px;
    width: 90%;
    box-shadow: var(--shadow);
  }

  .dialog h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 10px;
    color: var(--text);
  }

  .dialog p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .dialog-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Note fade-in */
  .note-item {
    animation: fadeSlide 0.2s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Responsive */
  @media (max-width: 700px) {
    #sidebar { width: 240px; min-width: 240px; }
    #note-body { padding: 24px 28px; }
    .editor-toolbar { padding: 12px 20px; }
    .status-bar { padding: 6px 28px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo">✦ Not Defteri <span>kişisel</span></div>
    <div class="note-count" id="note-count">0 not</div>
  </div>
  <div class="search-wrap">
    <div class="search-container">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Notlarda ara...">
    </div>
  </div>
  <div class="notes-list" id="notes-list"></div>
  <button class="new-note-btn" onclick="newNote()">+ Yeni Not</button>
</div>

<!-- Main -->
<div id="main">
  <!-- Welcome -->
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">✦</div>
    <h2>Not Defterine Hoş Geldin</h2>
    <p>Notların sadece tarayıcında saklanır. Yeni not oluşturmak için sol alttaki butona tıkla.</p>
  </div>

  <!-- Editor -->
  <div id="editor-screen" style="display:none; flex-direction:column; flex:1; overflow:hidden; display:none;">
    <div class="editor-toolbar">
      <div class="toolbar-left">
        <input type="text" id="note-title-input" placeholder="Başlık..." maxlength="100">
      </div>
      <div class="toolbar-right">
        <div class="tag-input-wrap">
          <span style="opacity:0.5">#</span>
          <input type="text" id="tag-input" placeholder="etiket" maxlength="20">
        </div>
        <button class="tb-btn save" onclick="saveNote()">Kaydet</button>
        <button class="tb-btn danger" onclick="confirmDelete()">Sil</button>
      </div>
    </div>
    <textarea id="note-body" placeholder="Düşüncelerini buraya yaz...&#10;&#10;Bu not yalnızca sana ait."></textarea>
    <div class="status-bar">
      <div class="status-indicator">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">kaydedilmedi</span>
      </div>
      <span id="word-count">0 kelime</span>
    </div>
  </div>
</div>

<!-- Delete confirm dialog -->
<div class="overlay" id="delete-overlay">
  <div class="dialog">
    <h3>Notu sil?</h3>
    <p>Bu not kalıcı olarak silinecek. Bu işlem geri alınamaz.</p>
    <div class="dialog-actions">
      <button class="tb-btn" onclick="closeDialog()">İptal</button>
      <button class="tb-btn danger" onclick="deleteNote()" style="background:#d94f4f;color:#fff;border-color:#d94f4f;">Evet, Sil</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // State
  let notes = JSON.parse(localStorage.getItem('notdefteri_notes') || '[]');
  let activeId = null;
  let saveTimeout = null;

  // Helpers
  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'az önce';
    if (diff < 3600000) return Math.floor(diff/60000) + ' dk önce';
    if (diff < 86400000) return Math.floor(diff/3600000) + ' sa önce';
    return d.toLocaleDateString('tr-TR', { day:'numeric', month:'short' });
  }

  function saveToStorage() {
    localStorage.setItem('notdefteri_notes', JSON.stringify(notes));
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 2200);
  }

  // Render note list
  function renderList(filter='') {
    const list = document.getElementById('notes-list');
    const count = document.getElementById('note-count');
    const q = filter.toLowerCase();

    let filtered = notes.filter(n =>
      n.title.toLowerCase().includes(q) ||
      n.body.toLowerCase().includes(q) ||
      (n.tag && n.tag.toLowerCase().includes(q))
    );

    // Sort: newest first
    filtered.sort((a,b) => b.updatedAt - a.updatedAt);

    count.textContent = notes.length + ' not';

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-list">${filter ? 'Sonuç bulunamadı.' : 'Henüz not yok.\nYeni not oluştur.'}</div>`;
      return;
    }

    list.innerHTML = filtered.map(n => `
      <div class="note-item${n.id === activeId ? ' active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-item-title">${escHtml(n.title || 'Başlıksız')}</div>
        <div class="note-item-preview">${escHtml((n.body || '').replace(/\n/g, ' ').slice(0, 60)) || '...'}</div>
        <div class="note-item-meta">
          <span class="note-item-date">${formatDate(n.updatedAt)}</span>
          ${n.tag ? `<span class="note-tag">#${escHtml(n.tag)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Open note
  function openNote(id) {
    activeId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;

    document.getElementById('welcome-screen').style.display = 'none';
    const ed = document.getElementById('editor-screen');
    ed.style.display = 'flex';

    document.getElementById('note-title-input').value = note.title || '';
    document.getElementById('note-body').value = note.body || '';
    document.getElementById('tag-input').value = note.tag || '';

    updateWordCount();
    setStatus('saved');
    renderList(document.getElementById('search-input').value);
  }

  // New note
  function newNote() {
    const note = {
      id: genId(),
      title: '',
      body: '',
      tag: '',
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    notes.unshift(note);
    saveToStorage();
    openNote(note.id);
    renderList();
    setTimeout(() => document.getElementById('note-title-input').focus(), 50);
  }

  // Save note
  function saveNote() {
    if (!activeId) return;
    const idx = notes.findIndex(n => n.id === activeId);
    if (idx === -1) return;

    notes[idx].title = document.getElementById('note-title-input').value.trim();
    notes[idx].body = document.getElementById('note-body').value;
    notes[idx].tag = document.getElementById('tag-input').value.trim().replace(/^#+/, '');
    notes[idx].updatedAt = Date.now();

    saveToStorage();
    setStatus('saved');
    renderList(document.getElementById('search-input').value);
    showToast('✓ Not kaydedildi');
  }

  // Auto-save
  function scheduleAutoSave() {
    setStatus('editing');
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      if (activeId) saveNote();
    }, 1500);
  }

  function setStatus(s) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (s === 'saved') { dot.className = 'dot saved'; txt.textContent = 'kaydedildi'; }
    else { dot.className = 'dot'; txt.textContent = 'kaydedilmedi'; }
  }

  function updateWordCount() {
    const val = document.getElementById('note-body').value;
    const words = val.trim() ? val.trim().split(/\s+/).length : 0;
    const chars = val.length;
    document.getElementById('word-count').textContent = `${words} kelime · ${chars} karakter`;
  }

  // Delete
  function confirmDelete() {
    if (!activeId) return;
    document.getElementById('delete-overlay').classList.add('show');
  }

  function closeDialog() {
    document.getElementById('delete-overlay').classList.remove('show');
  }

  function deleteNote() {
    closeDialog();
    if (!activeId) return;
    notes = notes.filter(n => n.id !== activeId);
    saveToStorage();
    activeId = null;

    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('welcome-screen').style.display = 'flex';
    renderList();
    showToast('Not silindi', 'error');
  }

  // Event listeners
  document.getElementById('note-title-input').addEventListener('input', scheduleAutoSave);
  document.getElementById('note-body').addEventListener('input', () => { updateWordCount(); scheduleAutoSave(); });
  document.getElementById('tag-input').addEventListener('input', scheduleAutoSave);

  document.getElementById('search-input').addEventListener('input', e => {
    renderList(e.target.value);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveNote();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      newNote();
    }
    if (e.key === 'Escape') closeDialog();
  });

  // Close dialog on overlay click
  document.getElementById('delete-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDialog();
  });

  // Init
  renderList();
  if (notes.length > 0) {
    // Don't auto-open, show welcome
  }
</script>
</body>
</html>
