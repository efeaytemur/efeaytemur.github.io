<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profil Bilgileri · İTÜ Saha</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    :root { --lime: #a8e063; --white: #f5f2eb; --dark: #0d1b0f; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--white);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
      background: 
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(45,106,79,0.3), transparent),
        #0d1b0f;
    }
    .container { width: 100%; max-width: 560px; }
    .top-logo { font-family: 'Bebas Neue', cursive; font-size: 28px; color: var(--lime); letter-spacing: 4px; text-decoration: none; display: block; text-align: center; margin-bottom: 40px; }

    .progress-bar { display: flex; align-items: center; gap: 0; margin-bottom: 40px; }
    .prog-step { flex: 1; text-align: center; }
    .prog-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 12px; font-weight: 700; }
    .prog-dot.done { background: var(--lime); color: var(--dark); }
    .prog-dot.active { background: rgba(168,224,99,0.2); border: 2px solid var(--lime); color: var(--lime); }
    .prog-dot.future { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(245,242,235,0.3); }
    .prog-label { font-size: 11px; color: rgba(245,242,235,0.4); }
    .prog-line { flex: 0 0 60px; height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 24px; }
    .prog-line.done { background: var(--lime); }

    h1 { font-family: 'Bebas Neue', cursive; font-size: 48px; letter-spacing: 2px; margin-bottom: 6px; }
    .subtitle { color: rgba(245,242,235,0.5); font-size: 14px; margin-bottom: 32px; font-weight: 300; }

    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:520px){ .form-row { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(245,242,235,0.5); margin-bottom: 8px; }
    .form-group input, .form-group select {
      width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      color: var(--white); font-size: 14px; font-family: 'DM Sans', sans-serif;
      outline: none; transition: all .2s; appearance: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--lime); background: rgba(168,224,99,0.05); box-shadow: 0 0 0 3px rgba(168,224,99,0.1); }
    .form-group input::placeholder { color: rgba(245,242,235,0.25); }
    .form-group input:disabled { opacity: .5; cursor: not-allowed; }
    .form-group select option { background: #1a2e1e; color: var(--white); }

    /* Category cards */
    .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-bottom: 16px; }
    .cat-card {
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 12px;
      cursor: pointer; transition: all .2s; text-align: center; background: rgba(255,255,255,0.03);
    }
    .cat-card:hover { border-color: rgba(168,224,99,0.3); }
    .cat-card.selected { border-color: var(--lime); background: rgba(168,224,99,0.12); }
    .cat-card .cat-icon { font-size: 24px; margin-bottom: 6px; }
    .cat-card .cat-name { font-size: 13px; font-weight: 600; }
    .cat-card .cat-price { font-size: 11px; color: var(--lime); margin-top: 3px; }

    .student-fields { display: none; }
    .student-fields.visible { display: block; }

    .btn-submit { width: 100%; padding: 15px; background: var(--lime); color: var(--dark); border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; transition: all .25s; box-shadow: 0 4px 20px rgba(168,224,99,0.25); }
    .btn-submit:hover { background: #c5f07a; transform: translateY(-2px); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .error-msg { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="top-logo">İTÜ SAHA</a>

    <div class="progress-bar">
      <div class="prog-step"><div class="prog-dot done">✓</div><div class="prog-label">Hesap</div></div>
      <div class="prog-line done"></div>
      <div class="prog-step"><div class="prog-dot active">2</div><div class="prog-label">Profil</div></div>
      <div class="prog-line"></div>
      <div class="prog-step"><div class="prog-dot future">3</div><div class="prog-label">Rezervasyon</div></div>
    </div>

    <h1>PROFİL BİLGİLERİ</h1>
    <p class="subtitle">Rezervasyon yapabilmek için bilgilerinizi tamamlayın.</p>

    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label>Ad Soyad</label>
          <input type="text" id="fullname" placeholder="Adınız Soyadınız">
        </div>
        <div class="form-group">
          <label>Telefon</label>
          <input type="tel" id="phone" placeholder="05xx xxx xx xx">
        </div>
      </div>

      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" disabled placeholder="Hesabınızdan alınıyor...">
      </div>

      <div class="form-group">
        <label>Kategori Seç</label>
        <div class="category-grid" id="catGrid">
          <div class="cat-card" data-val="ogrenci" onclick="selectCat(this)">
            <div class="cat-icon">🎓</div>
            <div class="cat-name">Öğrenci</div>
            <div class="cat-price">730₺/saat</div>
          </div>
          <div class="cat-card" data-val="personel" onclick="selectCat(this)">
            <div class="cat-icon">👔</div>
            <div class="cat-name">Personel</div>
            <div class="cat-price">1.120₺+</div>
          </div>
          <div class="cat-card" data-val="emekli" onclick="selectCat(this)">
            <div class="cat-icon">🏅</div>
            <div class="cat-name">Emekli</div>
            <div class="cat-price">1.120₺+</div>
          </div>
          <div class="cat-card" data-val="mezun" onclick="selectCat(this)">
            <div class="cat-icon">🎩</div>
            <div class="cat-name">Mezun</div>
            <div class="cat-price">1.750₺+</div>
          </div>
          <div class="cat-card" data-val="misafir" onclick="selectCat(this)">
            <div class="cat-icon">🤝</div>
            <div class="cat-name">Misafir</div>
            <div class="cat-price">2.100₺+</div>
          </div>
        </div>
        <input type="hidden" id="kategori">
      </div>

      <div class="student-fields" id="studentFields">
        <div class="form-row">
          <div class="form-group">
            <label>Bölüm</label>
            <input type="text" id="bolum" placeholder="Örn: Bilgisayar Müh.">
          </div>
          <div class="form-group">
            <label>Öğrenci No</label>
            <input type="text" id="ogrenciNo" placeholder="Örn: 150123456">
          </div>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-submit" id="saveBtn" onclick="saveProfile()">Profili Kaydet ve Devam Et →</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDBZcSMT3kxPG7XE3ro-jSNio_BDIDuN74",
      authDomain: "barcelona-sahasi.firebaseapp.com",
      projectId: "barcelona-sahasi",
      storageBucket: "barcelona-sahasi.firebasestorage.app",
      messagingSenderId: "22476229958",
      appId: "1:22476229958:web:4b2095e55a08e699856947",
      measurementId: "G-3JPM5WT1H9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('email').value = user.email || '';
      } else {
        window.location.href = 'login.html';
      }
    });

    function selectCat(el) {
      document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      const val = el.dataset.val;
      document.getElementById('kategori').value = val;
      document.getElementById('studentFields').className = 'student-fields' + (val === 'ogrenci' ? ' visible' : '');
    }

    async function saveProfile() {
      const fullname = document.getElementById('fullname').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const kategori = document.getElementById('kategori').value;
      const bolum = document.getElementById('bolum').value.trim();
      const ogrenciNo = document.getElementById('ogrenciNo').value.trim();
      const btn = document.getElementById('saveBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';

      if (!fullname) { errEl.textContent = 'Ad soyad giriniz.'; errEl.style.display = 'block'; return; }
      if (!phone) { errEl.textContent = 'Telefon numarası giriniz.'; errEl.style.display = 'block'; return; }
      if (!kategori) { errEl.textContent = 'Kategori seçiniz.'; errEl.style.display = 'block'; return; }
      if (kategori === 'ogrenci') {
        if (!bolum) { errEl.textContent = 'Bölüm giriniz.'; errEl.style.display = 'block'; return; }
        if (!ogrenciNo) { errEl.textContent = 'Öğrenci numarası giriniz.'; errEl.style.display = 'block'; return; }
      }

      btn.disabled = true; btn.textContent = 'Kaydediliyor...';
      const user = auth.currentUser;

      try {
        await db.collection('profile').doc(user.uid).set({
          fullname, phone, email: user.email, kategori,
          bolum: kategori === 'ogrenci' ? bolum : null,
          ogrenciNo: kategori === 'ogrenci' ? ogrenciNo : null,
          updatedAt: new Date()
        }, { merge: true });
        window.location.href = 'main.html';
      } catch (err) {
        errEl.textContent = 'Hata: ' + err.message; errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Profili Kaydet ve Devam Et →';
      }
    }
  </script>
</body>
</html>
