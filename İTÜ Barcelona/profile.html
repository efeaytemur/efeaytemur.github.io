<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profilim · İTÜ Saha</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    :root { --lime: #a8e063; --white: #f5f2eb; --dark: #0d1b0f; --border: rgba(255,255,255,0.08); --card: rgba(255,255,255,0.04); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; }

    .topbar { background: #0f2214; border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .topbar-logo { font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--lime); letter-spacing: 3px; text-decoration: none; }
    .tb-btn { padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); background: none; color: rgba(245,242,235,0.6); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all .2s; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .tb-btn:hover { border-color: var(--lime); color: var(--lime); }

    .main { max-width: 640px; margin: 0 auto; padding: 32px 16px; }
    .page-title { font-family: 'Bebas Neue', cursive; font-size: 48px; letter-spacing: 2px; margin-bottom: 6px; }
    .page-sub { color: rgba(245,242,235,0.4); font-size: 14px; margin-bottom: 28px; }

    /* Avatar block */
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; background: rgba(168,224,99,0.15); border: 2px solid rgba(168,224,99,0.3); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .avatar-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .avatar-email { font-size: 13px; color: rgba(245,242,235,0.4); }
    .avatar-cat { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; background: rgba(168,224,99,0.1); border: 1px solid rgba(168,224,99,0.25); color: var(--lime); padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(245,242,235,0.4); margin-bottom: 20px; }

    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: rgba(245,242,235,0.4); }
    .info-value { font-size: 14px; font-weight: 600; text-align: right; }

    .logout-btn { width: 100%; padding: 13px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 12px; color: rgba(239,68,68,0.8); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; margin-top: 8px; }
    .logout-btn:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.5); }

    .edit-btn { width: 100%; padding: 13px; background: var(--lime); color: var(--dark); border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; box-shadow: 0 4px 16px rgba(168,224,99,0.2); }
    .edit-btn:hover { background: #c5f07a; transform: translateY(-1px); }

    .loading { text-align: center; padding: 60px; color: rgba(245,242,235,0.3); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="topbar-logo">İTÜ SAHA</a>
    <div style="display:flex; gap:8px;">
      <a href="main.html" class="tb-btn">⚽ Rezervasyon Yap</a>
      <a href="reservations.html" class="tb-btn">📋 Rezervasyonlarım</a>
    </div>
  </div>

  <div class="main">
    <div class="page-title">PROFİLİM</div>
    <p class="page-sub">Hesap ve kişisel bilgileriniz</p>
    <div id="content"><div class="loading">Yükleniyor...</div></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDBZcSMT3kxPG7XE3ro-jSNio_BDIDuN74",
      authDomain: "barcelona-sahasi.firebaseapp.com",
      projectId: "barcelona-sahasi",
      storageBucket: "barcelona-sahasi.firebasestorage.app",
      messagingSenderId: "22476229958",
      appId: "1:22476229958:web:4b2095e55a08e699856947",
      measurementId: "G-3JPM5WT1H9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const catLabels = { ogrenci: '🎓 Öğrenci', personel: '👔 Personel', emekli: '🏅 Emekli', mezun: '🎩 Mezun', misafir: '🤝 Misafir' };

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'login.html'; return; }

      let data = {};
      try {
        const snap = await db.collection('profile').doc(user.uid).get();
        if (snap.exists) data = snap.data();
      } catch(_) {}

      const content = document.getElementById('content');
      const initials = (data.fullname || user.email || '?').charAt(0).toUpperCase();
      const catLabel = catLabels[data.kategori] || data.kategori || '—';

      content.innerHTML = `
        <div class="profile-header">
          <div class="avatar">${initials}</div>
          <div class="avatar-info">
            <h2>${data.fullname || 'İsimsiz'}</h2>
            <div class="avatar-email">${user.email}</div>
            <div class="avatar-cat">${catLabel}</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Kişisel Bilgiler</div>
          <div class="info-row"><span class="info-label">Ad Soyad</span><span class="info-value">${data.fullname || '—'}</span></div>
          <div class="info-row"><span class="info-label">Telefon</span><span class="info-value">${data.phone || '—'}</span></div>
          <div class="info-row"><span class="info-label">E-posta</span><span class="info-value">${user.email}</span></div>
          <div class="info-row"><span class="info-label">Kategori</span><span class="info-value">${catLabel}</span></div>
          ${data.bolum ? `<div class="info-row"><span class="info-label">Bölüm</span><span class="info-value">${data.bolum}</span></div>` : ''}
          ${data.ogrenciNo ? `<div class="info-row"><span class="info-label">Öğrenci No</span><span class="info-value">${data.ogrenciNo}</span></div>` : ''}
        </div>

        <button class="edit-btn" onclick="window.location.href='details.html'">✏️ Profili Düzenle</button>
        <br><br>
        <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
      `;
    });

    function logout() {
      auth.signOut().then(() => window.location.href = 'login.html');
    }
  </script>
</body>
</html>
